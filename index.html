<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Galería VR</title>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>

<style>
html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
}
#renderCanvas {
    width: 100%;
    height: 100%;
    touch-action: none;
}
</style>
</head>

<body>
<canvas id="renderCanvas"></canvas>

<script>

const canvas = document.getElementById("renderCanvas");
const engine = new BABYLON.Engine(canvas, true);

const createScene = async function () {

    const scene = new BABYLON.Scene(engine);
    scene.clearColor = new BABYLON.Color3(0.1, 0.1, 0.1);

    // LUZ
    const light = new BABYLON.HemisphericLight("light",
        new BABYLON.Vector3(0, 1, 0), scene);

    // SUELO
    const ground = BABYLON.MeshBuilder.CreateGround("ground", {
        width: 20,
        height: 20
    }, scene);

    // ACTIVAR XR (VR)
    const xr = await scene.createDefaultXRExperienceAsync({
        floorMeshes: [ground]
    });

    // MOVIMIENTO CON JOYSTICK
    scene.onBeforeRenderObservable.add(() => {

        xr.input.controllers.forEach((controller) => {

            const motionController = controller.motionController;
            if (!motionController) return;

            const thumbstick = motionController.getComponent("xr-standard-thumbstick");
            if (!thumbstick) return;

            const axes = thumbstick.axes;

            const camera = xr.baseExperience.camera;

            const forward = camera.getDirection(BABYLON.Vector3.Forward());
            forward.y = 0;
            forward.normalize();

            const right = camera.getDirection(BABYLON.Vector3.Right());
            right.y = 0;
            right.normalize();

            const speed = 0.05;

            camera.position.addInPlace(forward.scale(axes.y * speed));
            camera.position.addInPlace(right.scale(axes.x * speed));
        });
    });

    return scene;
};

createScene().then(scene => {
    engine.runRenderLoop(() => {
        scene.render();
    });
});

window.addEventListener("resize", function () {
    engine.resize();
});

</script>
</body>
</html>
